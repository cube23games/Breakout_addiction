name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      BREAKOUT_APP_SIGNING_KEYSTORE_BASE64: ${{ secrets.BREAKOUT_APP_SIGNING_KEYSTORE_BASE64 }}
      BREAKOUT_APP_SIGNING_STORE_PASSWORD: ${{ secrets.BREAKOUT_APP_SIGNING_STORE_PASSWORD }}
      BREAKOUT_APP_SIGNING_KEY_PASSWORD: ${{ secrets.BREAKOUT_APP_SIGNING_KEY_PASSWORD }}
      BREAKOUT_APP_SIGNING_KEY_ALIAS: ${{ secrets.BREAKOUT_APP_SIGNING_KEY_ALIAS }}
      BREAKOUT_APP_SIGNING_CERT_SHA256: ${{ secrets.BREAKOUT_APP_SIGNING_CERT_SHA256 }}
      BREAKOUT_PLAY_SIGNING_CERT_SHA256: ${{ secrets.BREAKOUT_PLAY_SIGNING_CERT_SHA256 }}
      BREAKOUT_BILLING_VERIFY_URL: ${{ secrets.BREAKOUT_BILLING_VERIFY_URL }}
      BREAKOUT_AI_GATEWAY_URL: ${{ secrets.BREAKOUT_AI_GATEWAY_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Validate and restore permanent signing key
        shell: bash
        run: |
          set -euo pipefail

          for name in \
            BREAKOUT_APP_SIGNING_KEYSTORE_BASE64 \
            BREAKOUT_APP_SIGNING_STORE_PASSWORD \
            BREAKOUT_APP_SIGNING_KEY_PASSWORD \
            BREAKOUT_APP_SIGNING_KEY_ALIAS \
            BREAKOUT_APP_SIGNING_CERT_SHA256
          do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub secret: $name"
              exit 1
            fi
          done

          KEYSTORE="$RUNNER_TEMP/breakout-addiction-app-signing.p12"
          printf '%s' "$BREAKOUT_APP_SIGNING_KEYSTORE_BASE64" |
            base64 --decode > "$KEYSTORE"
          chmod 600 "$KEYSTORE"
          echo "BREAKOUT_APP_SIGNING_KEYSTORE_PATH=$KEYSTORE" >> "$GITHUB_ENV"

          NORMALIZED_CERT="$(
            printf '%s' "$BREAKOUT_APP_SIGNING_CERT_SHA256" |
              tr -cd 'A-Fa-f0-9' |
              tr 'a-f' 'A-F'
          )"
          if [ "${#NORMALIZED_CERT}" -ne 64 ]; then
            echo "Signing-certificate SHA-256 secret is invalid."
            exit 1
          fi

          ALLOWED_CERTS="$NORMALIZED_CERT"
          if [ -n "${BREAKOUT_PLAY_SIGNING_CERT_SHA256:-}" ]; then
            PLAY_CERT="$(
              printf '%s' "$BREAKOUT_PLAY_SIGNING_CERT_SHA256" |
                tr -cd 'A-Fa-f0-9' |
                tr 'a-f' 'A-F'
            )"
            if [ "${#PLAY_CERT}" -ne 64 ]; then
              echo "Play signing-certificate SHA-256 secret is invalid."
              exit 1
            fi
            ALLOWED_CERTS="$ALLOWED_CERTS,$PLAY_CERT"
          fi

          echo "BREAKOUT_ALLOWED_SIGNING_SHA256=$ALLOWED_CERTS" >> "$GITHUB_ENV"

      - name: Define monotonic update version codes
        shell: bash
        run: |
          set -euo pipefail
          BASE_BUILD_NUMBER=$((100000 + GITHUB_RUN_NUMBER * 2))
          UPDATE_BUILD_NUMBER=$((BASE_BUILD_NUMBER + 1))
          echo "BASE_BUILD_NUMBER=$BASE_BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "UPDATE_BUILD_NUMBER=$UPDATE_BUILD_NUMBER" >> "$GITHUB_ENV"

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Run source security verifier
        run: |
          python3 tools/verify_ba56.py
          python3 tools/verify_ba56a.py
          python3 tools/verify_ba56b.py
          python3 tools/verify_ba56g.py
          python3 tools/verify_ba57_58.py
          python3 tools/verify_ba59.py
          python3 tools/verify_ba60.py
          python3 tools/verify_ba61.py
          python3 tools/verify_ba62.py
          python3 tools/verify_ba63.py
          python3 tools/verify_ba64.py
          python3 tools/verify_ba65.py
          python3 tools/verify_ba66.py
          python3 tools/verify_ba67.py
          python3 tools/verify_ba68.py
          python3 tools/verify_ba69.py
          python3 tools/verify_ba70a1.py
          python3 tools/verify_ba70a2.py
          python3 tools/verify_ba70a3.py
          python3 tools/verify_ba70a4.py
          python3 tools/verify_ba70a5.py
          python3 tools/verify_ba70a6.py
          python3 tools/verify_ba70a7.py
          python3 tools/verify_ba70a8.py
          python3 tools/verify_ba70a9.py
          python3 tools/verify_ba70a10.py

      - name: Configure isolated QA Android release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf android
          # Create platform folders if missing.
          flutter create --platforms=android --project-name breakout_addiction .
          # Configure Android scheduled notifications.
          python3 tools/patch_android_notifications.py
          python3 tools/patch_android_release_security.py --channel qa
          python3 tools/patch_android_screen_protection.py
          dart run flutter_launcher_icons

      - name: Build isolated QA APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --build-name=0.1.0-qa \
            --build-number="$BASE_BUILD_NUMBER" \
            --dart-define=BREAKOUT_BUILD_CHANNEL=qa \
            --dart-define=BREAKOUT_QA_ENTITLEMENTS=true \
            --dart-define=BREAKOUT_QA_BILLING=true \
            --dart-define=BREAKOUT_EXPECTED_PACKAGE=com.slimnation.breakoutaddiction.qa \
            --dart-define=BREAKOUT_ALLOWED_SIGNING_SHA256="$BREAKOUT_ALLOWED_SIGNING_SHA256"

          mkdir -p build/security-artifacts
          cp \
            build/app/outputs/flutter-apk/app-release.apk \
            build/security-artifacts/breakout-addiction-qa.apk

          python3 tools/verify_android_release_artifact.py \
            --artifact build/security-artifacts/breakout-addiction-qa.apk \
            --expected-package com.slimnation.breakoutaddiction.qa \
            --expected-version-code "$BASE_BUILD_NUMBER" \
            --expected-cert "$BREAKOUT_APP_SIGNING_CERT_SHA256"

      - name: Configure permanent public Android release
        shell: bash
        run: |
          set -euo pipefail
          rm -rf android
          # Create platform folders if missing.
          flutter create --platforms=android --project-name breakout_addiction .
          # Configure Android scheduled notifications.
          python3 tools/patch_android_notifications.py
          python3 tools/patch_android_release_security.py --channel public
          python3 tools/patch_android_screen_protection.py
          dart run flutter_launcher_icons

      - name: Build public baseline APK
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --build-name=0.1.0 \
            --build-number="$BASE_BUILD_NUMBER" \
            --dart-define=BREAKOUT_BUILD_CHANNEL=public \
            --dart-define=BREAKOUT_BILLING_VERIFY_URL="$BREAKOUT_BILLING_VERIFY_URL" \
            --dart-define=BREAKOUT_AI_GATEWAY_URL="$BREAKOUT_AI_GATEWAY_URL" \
            --dart-define=BREAKOUT_EXPECTED_PACKAGE=com.slimnation.breakoutaddiction \
            --dart-define=BREAKOUT_ALLOWED_SIGNING_SHA256="$BREAKOUT_ALLOWED_SIGNING_SHA256"

          cp \
            build/app/outputs/flutter-apk/app-release.apk \
            build/security-artifacts/breakout-addiction-public-baseline.apk

          python3 tools/verify_android_release_artifact.py \
            --artifact build/security-artifacts/breakout-addiction-public-baseline.apk \
            --expected-package com.slimnation.breakoutaddiction \
            --expected-version-code "$BASE_BUILD_NUMBER" \
            --expected-cert "$BREAKOUT_APP_SIGNING_CERT_SHA256"

      - name: Build public update APK and AAB
        shell: bash
        run: |
          set -euo pipefail
          flutter build apk \
            --release \
            --build-name=0.1.0 \
            --build-number="$UPDATE_BUILD_NUMBER" \
            --dart-define=BREAKOUT_BUILD_CHANNEL=public \
            --dart-define=BREAKOUT_BILLING_VERIFY_URL="$BREAKOUT_BILLING_VERIFY_URL" \
            --dart-define=BREAKOUT_AI_GATEWAY_URL="$BREAKOUT_AI_GATEWAY_URL" \
            --dart-define=BREAKOUT_EXPECTED_PACKAGE=com.slimnation.breakoutaddiction \
            --dart-define=BREAKOUT_ALLOWED_SIGNING_SHA256="$BREAKOUT_ALLOWED_SIGNING_SHA256"

          cp \
            build/app/outputs/flutter-apk/app-release.apk \
            build/security-artifacts/breakout-addiction-public-update.apk

          python3 tools/verify_android_release_artifact.py \
            --artifact build/security-artifacts/breakout-addiction-public-update.apk \
            --expected-package com.slimnation.breakoutaddiction \
            --expected-version-code "$UPDATE_BUILD_NUMBER" \
            --expected-cert "$BREAKOUT_APP_SIGNING_CERT_SHA256"

          flutter build appbundle \
            --release \
            --build-name=0.1.0 \
            --build-number="$UPDATE_BUILD_NUMBER" \
            --dart-define=BREAKOUT_BUILD_CHANNEL=public \
            --dart-define=BREAKOUT_BILLING_VERIFY_URL="$BREAKOUT_BILLING_VERIFY_URL" \
            --dart-define=BREAKOUT_AI_GATEWAY_URL="$BREAKOUT_AI_GATEWAY_URL" \
            --dart-define=BREAKOUT_EXPECTED_PACKAGE=com.slimnation.breakoutaddiction \
            --dart-define=BREAKOUT_ALLOWED_SIGNING_SHA256="$BREAKOUT_ALLOWED_SIGNING_SHA256"

          cp \
            build/app/outputs/bundle/release/app-release.aab \
            build/security-artifacts/breakout-addiction-public-update.aab

          python3 tools/verify_android_release_artifact.py \
            --artifact build/security-artifacts/breakout-addiction-public-update.aab \
            --expected-cert "$BREAKOUT_APP_SIGNING_CERT_SHA256"

      - name: Verify notification icon in release APK
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import zipfile

          apk = Path(
              'build/security-artifacts/'
              'breakout-addiction-public-update.apk'
          )
          with zipfile.ZipFile(apk) as archive:
              resources = archive.read('resources.arsc')

          resource_name = 'ic_stat_breakout'
          if (
              resource_name.encode('utf-8') not in resources
              and resource_name.encode('utf-16le') not in resources
          ):
              raise SystemExit(
                  'Release APK stripped @drawable/ic_stat_breakout.'
              )

          print('Public update APK contains the notification icon.')
          PY

      - name: Upload isolated QA APK
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-qa-apk
          path: build/security-artifacts/breakout-addiction-qa.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload public update-test APKs
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-public-update-test
          path: |
            build/security-artifacts/breakout-addiction-public-baseline.apk
            build/security-artifacts/breakout-addiction-public-update.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload public AAB
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-public-aab
          path: build/security-artifacts/breakout-addiction-public-update.aab
          if-no-files-found: error
          retention-days: 7
