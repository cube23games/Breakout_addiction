name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Create platform folders if missing
        run: |
          if [ ! -d android ]; then
            flutter create --platforms=android --project-name breakout_addiction .
          fi

      - name: Get packages
        run: flutter pub get

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

      - name: Enable Android desugaring for notifications
        run: |
          python3 - <<'PY2'
          from pathlib import Path

          groovy = Path('android/app/build.gradle')
          kts = Path('android/app/build.gradle.kts')

          if groovy.exists():
              text = groovy.read_text(encoding='utf-8')

              if 'coreLibraryDesugaringEnabled true' not in text:
                  if 'compileOptions {' in text:
                      text = text.replace(
                          'compileOptions \{\n',
                          'compileOptions {\n        coreLibraryDesugaringEnabled true\n',
                          1,
                      )
                  elif 'android {\n' in text:
                      text = text.replace(
                          'android {\n',
                          'android {\n    compileOptions {\n        coreLibraryDesugaringEnabled true\n        sourceCompatibility JavaVersion.VERSION_1_8\n        targetCompatibility JavaVersion.VERSION_1_8\n    }\n',
                          1,
                      )

              if "coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'" not in text:
                  if 'dependencies {' in text:
                      text = text.replace(
                          'dependencies {\n',
                          "dependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'\n",
                          1,
                      )
                  else:
                      text += "\n\ndependencies {\n    coreLibraryDesugaring 'com.android.tools:desugar_jdk_libs:2.1.5'\n}\n"

              groovy.write_text(text, encoding='utf-8')
              print(f'Patched {groovy}')

          elif kts.exists():
              text = kts.read_text(encoding='utf-8')

              if 'isCoreLibraryDesugaringEnabled = true' not in text:
                  if 'compileOptions {' in text:
                      text = text.replace(
                          'compileOptions {\n',
                          'compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n',
                          1,
                      )
                  elif 'android {\n' in text:
                      text = text.replace(
                          'android {\n',
                          'android {\n    compileOptions {\n        isCoreLibraryDesugaringEnabled = true\n        sourceCompatibility = JavaVersion.VERSION_1_8\n        targetCompatibility = JavaVersion.VERSION_1_8\n    }\n',
                          1,
                      )

              if 'coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")' not in text:
                  if 'dependencies {' in text:
                      text = text.replace(
                          'dependencies {\n',
                          'dependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")\n',
                          1,
                      )
                  else:
                      text += '\n\ndependencies {\n    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.5")\n}\n'

              kts.write_text(text, encoding='utf-8')
              print(f'Patched {kts}')

          else:
              raise SystemExit('android/app/build.gradle(.kts) not found in CI workspace')
          PY2

          grep -n "coreLibraryDesugaring\|desugar_jdk_libs\|compileOptions" android/app/build.gradle android/app/build.gradle.kts 2>/dev/null || true

      - name: Build QA entitlement APK
        run: |
          flutter build apk --release --dart-define=BREAKOUT_QA_ENTITLEMENTS=true
          mkdir -p build/qa-artifacts
          cp build/app/outputs/flutter-apk/app-release.apk build/qa-artifacts/breakout-addiction-qa-entitlements.apk
      - name: Build APK
        run: flutter build apk --release

      - name: Build AAB
        run: flutter build appbundle --release

      - name: List build outputs
        run: find build -maxdepth 7 -type f | sort

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-apk
          path: build/app/outputs/**/*.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload QA entitlement APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-qa-apk
          path: build/qa-artifacts/breakout-addiction-qa-entitlements.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: breakout-addiction-aab
          path: build/app/outputs/**/*.aab
          if-no-files-found: error
          retention-days: 7
